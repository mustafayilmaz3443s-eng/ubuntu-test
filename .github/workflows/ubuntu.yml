name: TMATE-10-INSTANT

on: [push]

jobs:
  tmate10:
    runs-on: ubuntu-latest
    steps:
      - name: Install tmate
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tmate

      - name: Start 10 tmate sessions and generate ALL_SSH.txt
        shell: bash
        run: |
          set -e
          rm -f ALL_SSH.txt
          touch ALL_SSH.txt

          for i in $(seq 1 10); do
            SOCK="/tmp/tmate-$i.sock"

            tmate -S "$SOCK" new-session -d
            tmate -S "$SOCK" wait tmate-ready

            SSH_LINE="$(tmate -S "$SOCK" display -p '#{tmate_ssh}')"
            WEB_LINE="$(tmate -S "$SOCK" display -p '#{tmate_web}')"

            {
              echo "NODE=$i"
              echo "SSH=$SSH_LINE"
              echo "WEB=$WEB_LINE"
              echo "-----"
            } >> ALL_SSH.txt

            echo "[$i] $SSH_LINE"
          done

          echo ""
          echo "==== ALL_SSH.txt ===="
          cat ALL_SSH.txt

      - name: Upload ALL_SSH.txt (IMMEDIATE)
        uses: actions/upload-artifact@v4
        with:
          name: ALL_SSH
          path: ALL_SSH.txt
          retention-days: 1

      - name: Keep sessions alive
        run: sleep 6h
